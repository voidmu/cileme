<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辞了么 - 守护神猫娘娘</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-home">
  <main class="container">
    <section class="card intro-card">
      <div class="pixel-cloud cloud-a" aria-hidden="true"></div>
      <div class="pixel-cloud cloud-b" aria-hidden="true"></div>
      <div class="sticker-row">
        <span class="bead-icon bead-star" aria-hidden="true"></span>
        <span class="bead-icon bead-heart" aria-hidden="true"></span>
        <span class="bead-icon bead-dice" aria-hidden="true"></span>
      </div>
      <h1>辞了么</h1>
      <p class="subtitle">献给每个深夜纠结要不要辞职的你</p>

      <div class="cat-wrap" aria-label="守护神拼豆形象猫娘娘">
        <div class="cat-ears">
          <span class="ear ear-left"></span>
          <span class="ear ear-right"></span>
        </div>
        <div class="cat-face">
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
          <span class="blush blush-left"></span>
          <span class="blush blush-right"></span>
        </div>
        <div class="cat-body"></div>
      </div>
      <div class="pixel-bell" aria-hidden="true"></div>
      <div class="pixel-fishbone" aria-hidden="true"></div>

      <div class="pixel-dialog">[SYSTEM] 猫娘娘在线：勇敢的人先赢一半。</div>
      <p class="blessing">猫娘娘曰：抛一抛，心里有数；敢不敢，听天由命。</p>
      <a class="btn primary" href="coin.html">进入抛硬币神坛</a>
      <p class="paper-note">今日手账关键词：勇气、选择、转机</p>
    </section>
  </main>
</body>
</html>
